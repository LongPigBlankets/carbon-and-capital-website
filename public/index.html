<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Carbon and Capital</title>
  <meta name="description" content="Carbon and Capital is a strategy game. A demo is coming soon.">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='16' fill='%230F1A17'/%3E%3Cpath d='M16 2a14 14 0 000 28z' fill='%2374B89A'/%3E%3Cpath d='M16 2a14 14 0 010 28z' fill='%23CBA255'/%3E%3C/svg%3E">
  <style>
    :root{
      --bg:#0F1A17;
      --bg-2:#0B1310;
      --glow:#142220;
      --ink:#ECEAE1;
      --carbon:#74B89A;
      --capital:#CBA255;
      --muted:#899A91;
      --rule:rgba(236,234,225,0.14);
      --font-display:"Iowan Old Style","Palatino Linotype","Book Antiqua",Palatino,Georgia,serif;
      --font-body:ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    }
    *{box-sizing:border-box;margin:0;padding:0;}
    html,body{height:100%;}
    body{
      font-family:var(--font-body);
      color:var(--ink);
      background:radial-gradient(120% 80% at 50% 18%, var(--glow) 0%, var(--bg) 46%, var(--bg-2) 100%);
      min-height:100svh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:2rem;
      text-align:center;
      -webkit-font-smoothing:antialiased;
      text-rendering:optimizeLegibility;
    }
    main{
      max-width:40rem;
      animation:rise .8s cubic-bezier(.2,.7,.2,1) both;
    }
    .title{
      font-family:var(--font-display);
      font-weight:600;
      letter-spacing:-0.012em;
      line-height:1.04;
      font-size:clamp(2.5rem,8vw,4.75rem);
      margin-bottom:1.05rem;
    }
    .title .carbon{color:var(--carbon);}
    .title .capital{color:var(--capital);}
    .title .amp{
      color:var(--muted);
      font-style:italic;
      font-weight:400;
      font-size:.72em;
      padding:0 .08em;
    }
    .lede{
      font-size:clamp(1.05rem,2.4vw,1.3rem);
      font-weight:400;
      letter-spacing:.01em;
    }
    .rule{
      width:3.25rem;
      height:1px;
      background:var(--rule);
      margin:1.9rem auto;
    }
    .note{
      font-size:clamp(.95rem,2vw,1.05rem);
      color:var(--muted);
      line-height:1.65;
      letter-spacing:.015em;
    }
    .note strong{
      color:var(--ink);
      font-weight:500;
    }
    @keyframes rise{
      from{opacity:0;transform:translateY(14px);}
      to{opacity:1;transform:none;}
    }
    @media (prefers-reduced-motion:reduce){
      main{animation:none;}
    }
  </style>
</head>
<body>
  <main>
    <h1 class="title">
      <span class="carbon">Carbon</span> <span class="amp">and</span> <span class="capital">Capital</span>
    </h1>
    <p class="lede">is a strategy game.</p>
    <div class="rule" role="presentation"></div>
    <p class="note"><strong>A demo will come out soon.</strong><br>Come back for updates.</p>
  </main>

  <!-- Visitor analytics -->
  <script data-goatcounter="https://carbonandcapital.goatcounter.com/count"
        async src="//gc.zgo.at/count.js"></script>
</body>
</html>
