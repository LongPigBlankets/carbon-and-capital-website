name: Deploy to Hetzner

# Runs on every push to main; merging a PR into main is a push to main.
on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repo
        uses: actions/checkout@v4

      - name: Load the SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.WEB_FTP_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p 22 "${{ secrets.WEB_FTP_SERVER }}" >> ~/.ssh/known_hosts

          - name: Deploy over SFTP
        uses: wlixcc/SFTP-Deploy-Action@v1.2.6
        with:
          server: ${{ secrets.WEB_FTP_SERVER }}
          username: ${{ secrets.WEB_FTP_USERNAME }}
          ssh_private_key: ${{ secrets.WEB_FTP_SSH_KEY }}
          port: 22
          local_path: './public/*'
          remote_path: '/usr/home/cig7qy/public_html/'
