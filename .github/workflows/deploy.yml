name: Deploy to Hetzner

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repo
        uses: actions/checkout@v4

      - name: Upload over SFTP
        uses: wangyucode/sftp-upload-action@v3
        with:
          host: ${{ secrets.WEB_FTP_SERVER }}
          username: ${{ secrets.WEB_FTP_USERNAME }}
          privateKey: ${{ secrets.WEB_FTP_SSH_KEY }}
          localDir: 'public'
          remoteDir: '/usr/home/cig7qy/public_html'
          forceUpload: true
