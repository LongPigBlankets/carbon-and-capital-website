name: Deploy to Hetzner

# Runs on every push to main; merging a PR into main is a push to main.
on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repo
        uses: actions/checkout@v4

      - name: Load the SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.WEB_FTP_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p 22 "${{ secrets.WEB_FTP_SERVER }}" >> ~/.ssh/known_hosts

      - name: Deploy with rsync over SSH
        run: |
          rsync -avz -e "ssh -i ~/.ssh/deploy_key -p 22" \
            ./public/ \
            "${{ secrets.WEB_FTP_USERNAME }}@${{ secrets.WEB_FTP_SERVER }}:public_html/"
          # Add --delete (right after -avz) if you want the server to mirror public/
          # exactly, i.e. remove anything on the server that isn't in your repo.
          # Left off here so a deploy can only add/update, never delete.
